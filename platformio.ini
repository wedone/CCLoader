; PlatformIO 配置：CCLoader WebUI for NodeMCU ESP8266
; 烧录接线与 CCLib 完全一致（单 DD 线方案），监控模式下无需切换接线即可看 CC2530 日志
;
; 接线表（NodeMCU ESP8266）：
;   GPIO5  (D1)  -> CC Pin 7 (RESETn)        烧录用
;   GPIO4  (D2)  -> CC Pin 3 (DC)            烧录用
;   GPIO12 (D6)  -> CC Pin 4 (DD)            烧录用
;   GPIO3  (RX)  -> CC P0_3   (UART0 TX)     监控用（新增第 4 根线）
;   GND          -> CC Pin 1 (GND)
;   GPIO2  (D4)  -> 板载蓝色 LED（状态指示：慢闪=连WiFi/常亮=就绪/快闪=烧录/短闪=监控）
;
; 注意：GPIO3 (RX) 与 USB-TTL 的 TX 共用同一物理引脚，监控态下 Serial 切换到
;       CC2530 波特率接收 P0_3 日志。WiFi 通信走 TCP，不占用 GPIO3。
;
; 无外部库依赖：SSE 用原生 WiFiServer（端口 81），JSON 用 String 手工拼接/解析。
;   - HTTP/Static: ESP8266WebServer (80)
;   - 实时推送:    WiFiServer SSE   (81)  浏览器用 EventSource 连接
;
; 编译烧录 ESP8266 固件：
;   python -m platformio run -t upload --upload-port COMx
;
; 上传 WebUI 静态文件到 LittleFS（首次或更新前端时执行）：
;   python -m platformio run -t uploadfs --upload-port COMx
;
; 串口监视器（查看 ESP8266 启动 IP 等调试信息）：
;   python -m platformio device monitor -p COMx -b 115200

[platformio]
default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266@4.2.0
board = nodemcuv2
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    -DLED_BUILTIN=2
